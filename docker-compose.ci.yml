# GL-03 / CI — full-stack for integration & E2E (API + worker + web + deps).
# Boot: `docker compose -f docker-compose.ci.yml up --build -d`
# Wait for health endpoints, then run Playwright against http://localhost:3000
#
# Requires: Docker build context = repository root (for apps/web and apps/worker).

services:
  postgres:
    image: ghcr.io/dbsystel/postgresql-partman:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: forge_ci
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  api:
    build:
      context: ./apps/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/forge_ci
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: test
      AUTH_TEST_BYPASS: "true"
      FORGE_E2E_TOKEN: "ci-forge-e2e-token"
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
      CORS_ORIGINS_EXTRA: ""
      APP_PUBLIC_URL: http://localhost:3000
      API_BASE_URL: http://localhost:8000
      UPGRADE_URL: http://localhost:3000/settings/billing
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: forge-uploads
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      PUBLIC_ASSET_BASE_URL: http://minio:9000/forge-uploads
    command: >
      sh -c "uv run --no-dev alembic upgrade head && uv run --no-dev uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/forge_ci
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: forge-uploads
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
