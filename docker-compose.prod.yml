# Minimal production-*image* smoke (GL-04): builds run like CI; runtime env is not full public production.
# For real internet deploys use `ENVIRONMENT=production` with all vars in `docs/runbooks/PRODUCTION_LAUNCH.md`.
# Web image requires monorepo root context (see apps/web/Dockerfile).
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Not `production` — that mode requires HTTPS URLs, Clerk issuer, CORS, etc. (see PRODUCTION_LAUNCH.md).
      - ENVIRONMENT=development
