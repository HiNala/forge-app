name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Lint web
        run: pnpm --filter web lint
      - name: Typecheck web
        run: pnpm --filter web typecheck
      - name: OpenAPI TypeScript drift check
        run: |
          cd apps/web && pnpm exec openapi-typescript ../api/openapi.json -o /tmp/schema.gen.ts && diff -q src/lib/api/schema.gen.ts /tmp/schema.gen.ts

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ghcr.io/dbsystel/postgresql-partman:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/forge_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: cd apps/api && uv sync
      - name: Alembic migrate
        run: cd apps/api && uv run alembic upgrade head
      - name: Ruff check
        run: cd apps/api && uv run ruff check .
      - name: Mypy check
        run: cd apps/api && uv run mypy app
      - name: OpenAPI JSON drift check
        run: |
          cd apps/api && uv run python scripts/export_openapi.py /tmp/openapi.json && diff -q openapi.json /tmp/openapi.json
      - name: Pytest
        run: cd apps/api && uv run pytest
      - name: Alembic round-trip (downgrade base → upgrade head)
        run: cd apps/api && uv run alembic downgrade base && uv run alembic upgrade head
      - name: Verify RLS on tenant tables
        run: cd apps/api && uv run python ../../scripts/check-rls.py
