name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Lint web
        run: pnpm --filter web lint
      - name: Typecheck web
        run: pnpm --filter web typecheck

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: cd apps/api && uv sync
      - name: Ruff check
        run: cd apps/api && uv run ruff check .
      - name: Mypy check
        run: cd apps/api && uv run mypy app
      - name: Pytest
        run: cd apps/api && uv run pytest
