# Mission 08 — production: manual gate + GitHub Environment reviewers + smoke checks.
name: Deploy production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type deploy to confirm"
        required: true
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  railway-production:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Guard
        run: |
          test "${{ github.event.inputs.confirm }}" = "deploy" || { echo "Set confirm to 'deploy'"; exit 1; }

      - name: Install Railway CLI
        run: npm i -g @railway/cli@3

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set."
            exit 1
          fi
          if [ -z "${{ secrets.RAILWAY_SERVICE_ID_PRODUCTION }}" ]; then
            echo "RAILWAY_SERVICE_ID_PRODUCTION not set."
            exit 1
          fi
          railway up --service "${{ secrets.RAILWAY_SERVICE_ID_PRODUCTION }}"

      - name: Post-deploy smoke (web + API)
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          if [ -z "$PRODUCTION_BASE_URL" ]; then
            echo "PRODUCTION_BASE_URL not set — skip."
            exit 0
          fi
          curl -fsS -o /dev/null --max-time 30 "$PRODUCTION_BASE_URL/"
          curl -fsS -o /dev/null --max-time 30 "$PRODUCTION_BASE_URL/robots.txt" || true
          if [ -n "$PRODUCTION_API_URL" ]; then
            curl -fsS -o /dev/null --max-time 30 "$PRODUCTION_API_URL/health/live"
            curl -fsS --max-time 30 "$PRODUCTION_API_URL/health/deep" | head -c 2000
          fi
