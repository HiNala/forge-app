# GL-04 — deploy staging when `main` is green (Railway GitHub-linked deploy is primary).
# This workflow optionally triggers `railway up` if secrets are set; otherwise no-op.
name: Deploy staging

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "infra/**"
      - "packages/**"
      - ".github/workflows/deploy-staging.yml"

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  railway-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli@3

      - name: Deploy (optional)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set — skipping CLI deploy (rely on Railway GitHub integration)."
            exit 0
          fi
          if [ -z "${{ secrets.RAILWAY_SERVICE_ID_STAGING }}" ]; then
            echo "RAILWAY_SERVICE_ID_STAGING not set — skipping."
            exit 0
          fi
          railway up --service "${{ secrets.RAILWAY_SERVICE_ID_STAGING }}" || true

      - name: Post-deploy smoke (optional)
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          if [ -z "$STAGING_BASE_URL" ]; then
            echo "STAGING_BASE_URL not set — skip remote smoke."
            exit 0
          fi
          curl -fsS -o /dev/null --max-time 30 "$STAGING_BASE_URL/" || exit 1
