<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>$title</title>
  <style>
    :root {
      --brand-primary: $primary;
      --brand-secondary: $secondary;
      --brand-text: #111827;
      --brand-bg: #fafafa;
    }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; color: var(--brand-text); background: var(--brand-bg); line-height: 1.5; }
    .forge-hero { padding: 3rem 1.5rem; background: linear-gradient(135deg, var(--brand-primary)22, transparent); }
    .forge-hero h1 { margin: 0 0 0.5rem; font-size: 2rem; }
    .forge-sub { opacity: 0.9; margin: 0; }
    .forge-form { padding: 1.5rem; max-width: 40rem; margin: 0 auto; }
    .forge-form-inner label { display: block; margin-bottom: 1rem; }
    .forge-form-inner input, .forge-form-inner textarea { width: 100%; box-sizing: border-box; padding: 0.5rem; margin-top: 0.25rem; }
    .forge-submit { margin-top: 1rem; padding: 0.6rem 1.2rem; background: var(--brand-primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .forge-cta { padding: 1.5rem; background: var(--brand-secondary)18; text-align: center; }
    .forge-footer { padding: 1rem; text-align: center; font-size: 0.875rem; opacity: 0.8; }
  </style>
</head>
<body>
$body
</body>
</html>
