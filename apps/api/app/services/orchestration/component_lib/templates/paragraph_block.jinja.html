<section data-forge-section="{{ section_id | e }}" class="forge-sec">
  <div class="forge-container">
    {% if props.eyebrow %}<p class="forge-eyebrow">{{ props.eyebrow | e }}</p>{% endif %}
    {% if props.headline or props.title %}
    <h2 class="forge-h2">{{ (props.headline or props.title) | e }}</h2>
    {% endif %}
    {% if props.body %}
    <div class="forge-body-text" style="max-width:68ch;">
      {{ props.body | e | replace('\n', '<br>') | safe }}
    </div>
    {% endif %}
    {% if props.html %}
    <div class="forge-body-text">{{ props.html | safe }}</div>
    {% endif %}
  </div>
</section>
