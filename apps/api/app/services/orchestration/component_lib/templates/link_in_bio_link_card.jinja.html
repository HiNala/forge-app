<section data-forge-section="{{ section_id | e }}" class="forge-sec forge-lib-card" data-component="link_in_bio_link_card">
  <div class="forge-container" style="max-width:28rem;margin:0 auto;">
    <a href="{{ (props.href or props.url or '#') | e }}"
       class="forge-btn"
       data-forge-analytics="link_click"
       data-link-label="{{ (props.text or props.label or 'Link') | e }}"
       style="display:flex;width:100%;align-items:center;justify-content:center;gap:.5rem;padding:1rem 1.25rem;
              border-radius:var(--radius-xl,16px);border:1px solid rgba(15,23,42,.08);background:#fff;
              font-weight:600;text-decoration:none;color:inherit;box-shadow:0 1px 2px rgba(15,23,42,.06);">
      {% if props.emoji %}<span aria-hidden="true">{{ props.emoji | e }}</span>{% endif %}
      <span>{{ (props.text or props.label or 'Open link') | e }}</span>
    </a>
    {% if props.hint %}<p class="forge-muted" style="text-align:center;font-size:.78rem;margin-top:.35rem;opacity:.65;">{{ props.hint | e }}</p>{% endif %}
  </div>
</section>
