<section data-forge-section="{{ section_id | e }}" class="forge-sec forge-hero forge-full-bleed" style="padding:4rem 1.5rem;background:linear-gradient(135deg, var(--brand-primary)18, transparent);">
  <h1 style="font-size:2.25rem;margin:0 0 0.5rem;">{{ (props.title or props.headline) | e }}</h1>
  {% if props.subtitle %}<p style="opacity:0.9;max-width:40rem;">{{ props.subtitle | e }}</p>{% endif %}
</section>
