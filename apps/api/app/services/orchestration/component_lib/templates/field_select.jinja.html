<div class="forge-field">
  <label class="forge-field-label" for="{{ props.name | e }}-{{ section_id | e }}">
    {{ props.label | e }}{% if props.required %}<span class="forge-req" aria-hidden="true">*</span>{% endif %}
  </label>
  <select
    id="{{ props.name | e }}-{{ section_id | e }}"
    name="{{ props.name | e }}"
    class="forge-input forge-select"
    {% if props.required %}required aria-required="true"{% endif %}
  >
    <option value="">{{ props.placeholder | default('Select an option') | e }}</option>
    {% for opt in (props.options or []) %}
    <option value="{{ opt.value | default(opt) | e }}">{{ opt.label | default(opt) | e }}</option>
    {% endfor %}
  </select>
  {% if props.hint %}<p class="forge-input-hint">{{ props.hint | e }}</p>{% endif %}
</div>
