services:
  web:
    image: node:20-bookworm-slim
    working_dir: /srv
    env_file:
      - .env
    volumes:
      - .:/srv
      # Linux deps inside the container (avoid bind-mounting Windows node_modules)
      - web_root_node_modules:/srv/node_modules
      - web_app_node_modules:/srv/apps/web/node_modules
    ports:
      # Host 3001 avoids clashing with a local Next.js dev server on 3000
      - "3001:3000"
    depends_on:
      api:
        condition: service_started
    environment:
      # Do not set CI=true — pnpm treats CI as frozen-lockfile and our dev lock can lag package.json
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_APP_URL=http://localhost:3001
    command: >
      sh -c "corepack enable && corepack prepare pnpm@9 --activate && pnpm install --no-frozen-lockfile && pnpm --filter web dev --hostname 0.0.0.0 --port 3000"

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Mount source only; leave image .venv/pyproject intact (full /app mount hid .venv)
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/alembic:/app/alembic
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/forge_dev
      - REDIS_URL=redis://redis:6379/0
      # Match web service (host 3001) and local Next on 3000
      - BACKEND_CORS_ORIGINS=["http://localhost:3000","http://localhost:3001"]
      - APP_PUBLIC_URL=http://localhost:3001
      - UPGRADE_URL=http://localhost:3001/settings
    command: >
      sh -c "uv run --no-dev alembic upgrade head && uv run --no-dev uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./apps/worker/worker.py:/app/worker.py
      - ./apps/api/app:/app/api/app
    environment:
      - REDIS_URL=redis://redis:6379/0

  postgres:
    # pg_partman pre-installed (Mission BI-01 / ADR-004). See docs/architecture/PARTITIONING.md.
    image: ghcr.io/dbsystel/postgresql-partman:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=forge_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
  miniodata:
  web_root_node_modules:
  web_app_node_modules:
